name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: windows-2022
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: matrix.platform == 'linux'
        run: npm run lint

      - name: Build frontend + Pagefind index
        run: npm run build

      - name: Build Tauri app
        run: npm run desktop

      - name: Upload .deb artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload .msi artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload NSIS .exe artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.13846066"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + Pagefind index
        run: npm run build

      - name: Build Android APK
        run: npm run android:apk:native-tts
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.13846066

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: papercut-android-native-tts-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 7
