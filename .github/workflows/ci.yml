name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            cache_suffix: ""
          - os: windows-2022
            platform: windows
            cache_suffix: ""
          - os: macos-15-intel
            platform: macos
            arch: x64
            cache_suffix: "-x64"
          - os: macos-15
            platform: macos
            arch: arm64
            cache_suffix: "-arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            patchelf \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}${{ matrix.cache_suffix }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}${{ matrix.cache_suffix }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        if: matrix.platform == 'linux'
        run: npm run lint

      - name: Build frontend + Pagefind index
        run: npm run build

      - name: Build Tauri app
        run: npm run desktop

      - name: Verify AppImage media bundle
        if: matrix.platform == 'linux'
        run: npm run verify:appimage-media

      - name: Verify macOS bundled runtime libraries
        if: matrix.platform == 'macos'
        run: node scripts/verify-macos-bundle-libs.js

      - name: Upload .deb artifact (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7

      - name: Upload .msi artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 7

      - name: Upload NSIS .exe artifact (Windows)
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

      - name: Upload .dmg artifact (macOS)
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-macos-${{ matrix.arch }}-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          retention-days: 7

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.13846066"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: android-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + Pagefind index
        run: npm run build

      - name: Build Android APK
        run: npm run android:apk:native-tts
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.13846066

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: papercut-android-native-tts-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          retention-days: 7

  build-ios:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Verify Xcode and iOS SDK version
        run: |
          xcodebuild -version
          xcrun --find swiftc
          xcrun --find swift
          swiftc -version
          sdk_version="$(xcrun --sdk iphoneos --show-sdk-version)"
          sdk_path="$(xcrun --sdk iphoneos --show-sdk-path)"
          swift_lib_dir="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift"
          sdk_major="${sdk_version%%.*}"
          if [ "$sdk_major" -lt 26 ]; then
            echo "iOS builds require iOS 26 SDK or newer; App Store uploads reject older SDKs; found $sdk_version" >&2
            exit 1
          fi
          if [ ! -d "$swift_lib_dir" ]; then
            echo "Missing Xcode Swift library directory: $swift_lib_dir" >&2
            exit 1
          fi
          echo "Using iOS SDK $sdk_version at $sdk_path"
          echo "Using Swift libraries at $swift_lib_dir"
          find "$swift_lib_dir" -maxdepth 3 \( -name 'libswiftCompatibility56*' -o -name 'libswiftCompatibilityConcurrency*' -o -name 'libswiftCompatibilityPacks*' \) -print || true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust with iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ios-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ios-cargo-

      - name: Install CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            brew install cocoapods
          fi
          pod --version

      - name: Install dependencies
        run: npm ci

      - name: Build frontend + Pagefind index
        run: npm run build

      - name: Verify generated iOS project files
        run: |
          test -d src-tauri/gen/apple
          test -f src-tauri/gen/apple/app.xcodeproj/project.pbxproj
          test -f src-tauri/gen/apple/app.xcodeproj/xcshareddata/xcschemes/app_iOS.xcscheme
          test -f src-tauri/gen/apple/app_iOS/Info.plist
          test -f src-tauri/gen/apple/app_iOS/app_iOS.entitlements

      - name: Build unsigned iOS simulator app with native TTS
        run: npm run ios:ci -- --native-tts

      - name: Build unsigned iOS device app with native TTS
        run: npm run ios:ci:device
