name: Init iOS Project

on:
  workflow_dispatch:
  push:
    branches:
      - feature/ios-release
    paths:
      - .github/workflows/ios-init.yml
      - package.json
      - package-lock.json
      - scripts/**
      - src-tauri/Cargo.lock
      - src-tauri/Cargo.toml
      - src-tauri/tauri.conf.json
      - src-tauri/tauri.ios.conf.json

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios-init:
    name: Generate Tauri iOS project
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Install CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            brew install cocoapods
          fi
          pod --version

      - name: Install dependencies
        run: npm ci

      - name: Initialize Tauri iOS project
        run: npm run ios:init

      - name: Verify generated Apple project
        run: |
          test -d src-tauri/gen/apple
          find src-tauri/gen/apple -maxdepth 3 -type f | sort

      - name: Upload generated Apple project
        uses: actions/upload-artifact@v7
        with:
          name: src-tauri-gen-apple
          path: src-tauri/gen/apple
          if-no-files-found: error
          retention-days: 14
