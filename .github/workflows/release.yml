name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            cache_suffix: ""
          - os: windows-2022
            platform: windows
            cache_suffix: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          xargs sudo apt-get install -y <<'APT'
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          build-essential
          curl
          wget
          file
          libssl-dev
          libxdo-dev
          patchelf
          gstreamer1.0-plugins-base
          gstreamer1.0-plugins-good
          APT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: release-${{ runner.os }}${{ matrix.cache_suffix }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: release-${{ runner.os }}${{ matrix.cache_suffix }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run desktop

      - name: Verify AppImage media bundle
        if: matrix.platform == 'linux'
        run: npm run verify:appimage-media

      - name: Upload Linux bundles
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows bundles
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-windows-bundles
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    environment: apple-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
            cache_suffix: "-x64"
          - os: macos-15
            arch: arm64
            cache_suffix: "-arm64"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: release-${{ runner.os }}${{ matrix.cache_suffix }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: release-${{ runner.os }}${{ matrix.cache_suffix }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          trap 'rm -f certificate.p12 certificate.pem certificate-keychain.p12' EXIT
          printf '%s' "$APPLE_CERTIFICATE" | base64 -d > certificate.p12
          openssl pkcs12 -in certificate.p12 -info -noout -passin env:APPLE_CERTIFICATE_PASSWORD
          openssl pkcs12 -in certificate.p12 -nodes -out certificate.pem -passin env:APPLE_CERTIFICATE_PASSWORD
          openssl pkcs12 -export \
            -in certificate.pem \
            -out certificate-keychain.p12 \
            -passout env:APPLE_CERTIFICATE_PASSWORD \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg sha1

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          security import certificate-keychain.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          detected_identity="$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
          if [ -z "$detected_identity" ]; then
            echo "No Developer ID Application signing identity found in build.keychain" >&2
            exit 1
          fi
          echo "::add-mask::$detected_identity"
          echo "APPLE_SIGNING_IDENTITY=$detected_identity" >> "$GITHUB_ENV"

      - name: Prepare Apple notarization key
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          key_path="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_BASE64" | base64 -d > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build signed and notarized Tauri app
        run: npm run desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}

      - name: Verify macOS bundled runtime libraries
        run: |
          resources_dir="src-tauri/target/release/bundle/macos/Papercut.app/Contents/Resources"
          required_libs=(libsherpa-onnx-c-api.dylib libonnxruntime.dylib)
          optional_libs=(libsherpa-onnx-cxx-api.dylib)
          for lib in "${required_libs[@]}"; do
            if [ ! -f "$resources_dir/$lib" ]; then
              echo "Missing macOS runtime library: $resources_dir/$lib" >&2
              find "src-tauri/target/release/bundle/macos/Papercut.app/Contents" -maxdepth 3 -type f | sort >&2
              exit 1
            fi
          done
          for lib in "${required_libs[@]}" "${optional_libs[@]}"; do
            if [ -f "$resources_dir/$lib" ]; then
              file "$resources_dir/$lib"
              codesign --verify --strict --verbose=2 "$resources_dir/$lib"
            fi
          done
          otool -L "src-tauri/target/release/bundle/macos/Papercut.app/Contents/MacOS/app"

      - name: Notarize and staple macOS DMG
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          shopt -s nullglob
          dmgs=(src-tauri/target/release/bundle/dmg/*.dmg)
          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "No macOS DMG found to notarize" >&2
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done

      - name: Verify macOS signature and notarization
        run: |
          codesign --verify --deep --strict --verbose=2 "src-tauri/target/release/bundle/macos/Papercut.app"
          spctl --assess --type execute --verbose=4 "src-tauri/target/release/bundle/macos/Papercut.app"
          spctl --assess --type open --context context:primary-signature --verbose=4 src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload macOS bundles
        uses: actions/upload-artifact@v7
        with:
          name: papercut-macos-${{ matrix.arch }}-bundles
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.13846066"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: release-android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: release-android-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build Android native TTS APK
        run: npm run android:apk:native-tts
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.13846066

      - name: Rename Android APK
        run: |
          mkdir -p release-out
          cp src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk "release-out/Papercut_${RELEASE_TAG}_android-arm64-v8a.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: papercut-android-native-tts-apk
          path: release-out/*.apk
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs:
      - build-desktop
      - build-macos
      - build-android
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: papercut-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          find release-artifacts -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find release-artifacts -type f -print | sort)

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes "Papercut $RELEASE_TAG release artifacts." --latest
          fi
