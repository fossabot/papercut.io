name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: windows-2022
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          xargs sudo apt-get install -y <<'APT'
          libwebkit2gtk-4.1-dev
          libgtk-3-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          build-essential
          curl
          wget
          file
          libssl-dev
          libxdo-dev
          APT

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: release-${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: release-${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run desktop

      - name: Upload Linux bundles
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-linux-bundles
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows bundles
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: papercut-windows-bundles
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

  build-android:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;29.0.13846066"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: release-android-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: release-android-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build Android native TTS APK
        run: npm run android:apk:native-tts
        env:
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.13846066

      - name: Rename Android APK
        run: |
          mkdir -p release-out
          cp src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk "release-out/Papercut_${RELEASE_TAG}_android-arm64-v8a.apk"

      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: papercut-android-native-tts-apk
          path: release-out/*.apk
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs:
      - build-desktop
      - build-android
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: papercut-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          find release-artifacts -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find release-artifacts -type f -print | sort)

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes "Papercut $RELEASE_TAG release artifacts." --latest
          fi
